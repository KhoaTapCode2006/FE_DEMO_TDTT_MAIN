<!--
  hotel-react.html — Booking4LU Hotel Detail Page (React Edition)
  ══════════════════════════════════════════════════════════════════════════════
  Self-contained React app — no build step required.
  Reads ?id=<hotelId> from the URL, loads hotel data (mock or API),
  and renders the full hotel detail view matching the design screenshot.

  Sections:
    • Navbar (shared)
    • Breadcrumb + Share/Save actions
    • Image gallery (hero carousel + thumbnail strip)
    • Left column: About, Full Description, Guest Reviews
    • Right column: Booking card (dates, guests, Book Now)
                    Nearby Landmarks + mini-map
                    Transport CTA

  Linked from: homepage-react.html → HotelPopup → "Visit Hotel Page" button
  ══════════════════════════════════════════════════════════════════════════════
-->

  <style>
    * { box-sizing: border-box; }

    .ms {
      font-family: 'Material Symbols Outlined';
      font-variation-settings: 'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
      font-size: 22px; line-height: 1;
      user-select: none; display: inline-block;
    }
    .ms-filled { font-variation-settings: 'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24; }

    .glass {
      background: rgba(255,255,255,0.90);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    /* Hero carousel */
    .hero-track { transition: transform .38s cubic-bezier(.4,0,.2,1); }

    /* Thumbnail strip */
    .thumb-strip::-webkit-scrollbar { height: 4px; }
    .thumb-strip::-webkit-scrollbar-thumb { background:#c2c6d3; border-radius:4px; }

    /* Skeleton */
    @keyframes shimmer {
      0%   { background-position:-800px 0; }
      100% { background-position: 800px 0; }
    }
    .skeleton {
      background: linear-gradient(90deg,#e6e8eb 25%,#f2f4f7 50%,#e6e8eb 75%);
      background-size: 1600px 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 12px;
    }

    /* Slide-up */
    @keyframes slideUp {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fade-in { animation: slideUp .3s ease forwards; }

    /* Review card */
    .review-card { transition: box-shadow .2s; }
    .review-card:hover { box-shadow: 0 4px 20px rgba(0,52,111,.08); }

    /* Date input */
    input[type="date"]::-webkit-calendar-picker-indicator { opacity:.5; cursor:pointer; }

    /* Map placeholder */
    .map-tile {
      background: #e8eaed;
      background-image:
        linear-gradient(rgba(255,255,255,.5) 1px,transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.5) 1px,transparent 1px),
        linear-gradient(rgba(0,0,0,.04) 1px,transparent 1px),
        linear-gradient(90deg,rgba(0,0,0,.04) 1px,transparent 1px);
      background-size: 80px 80px,80px 80px,16px 16px,16px 16px;
    }

    /* Page scrollbar */
    body::-webkit-scrollbar { width:6px; }
    body::-webkit-scrollbar-thumb { background:#c2c6d3; border-radius:4px; }

    /* Line clamp */
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
  </style>
</head>

            desc:"Saigon's iconic 68-floor tower with a helipad jutting from the 52nd floor — a symbol of modern Vietnam." },
          { name:"Ben Thanh Market",        icon:"storefront", distance:"0.6 km",
            image:"https://upload.wikimedia.org/wikipedia/commons/thumb/5/5c/Ben_Thanh_market%2C_Ho_Chi_Minh_City%2C_Vietnam.jpg/320px-Ben_Thanh_market%2C_Ho_Chi_Minh_City%2C_Vietnam.jpg",
            desc:"Iconic 1914 market hall — the symbol of Saigon. Packed with street food, souvenirs, and local produce." },
          { name:"Saigon River",            icon:"water",      distance:"0.3 km",
            image:"https://upload.wikimedia.org/wikipedia/commons/thumb/6/6e/Saigon_River_panorama.jpg/320px-Saigon_River_panorama.jpg",
            desc:"The lifeblood of Ho Chi Minh City — enjoy sunset river cruises and stunning skyline views from the banks." },

    window.API = {

    // ── Read hotel id from URL ─────────────────────────────────────────────────
    window.HOTEL_ID = new URLSearchParams(window.location.search).get("id") || "1";

  <!-- ═══════════════════════════════════════════════════════════════════════
       REACT APPLICATION
       Each function = one future .jsx component file
  ═══════════════════════════════════════════════════════════════════════════ -->
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    /* ── Shared helpers ─────────────────────────────────────────────────── */
    const AMENITY_META = {
      wifi:           { icon:"wifi",           label:"Free WiFi" },
      pool:           { icon:"pool",           label:"Pool" },
      fitness_center: { icon:"fitness_center", label:"Gym" },
      spa:            { icon:"spa",            label:"Spa" },
      restaurant:     { icon:"restaurant",     label:"Restaurant" },
      bar:            { icon:"local_bar",      label:"Bar" },
    };

    function fmtPrice(n, cur="VND") {
      if (cur==="VND") return (n/1e6).toFixed(1)+"M VND";
      return new Intl.NumberFormat("en-US",{style:"currency",currency:cur,maximumFractionDigits:0}).format(n);
    }

    function fmtDate(d) {
      if (!d) return "";
      return new Date(d).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
    }

    /* ── Icon helper ────────────────────────────────────────────────────── */
    function Icon({ name, filled=false, size=22, className="" }) {
      const style = {
        fontFamily:"Material Symbols Outlined",
        fontVariationSettings: filled
          ? "'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24"
          : "'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24",
        fontSize: size,
        lineHeight:1,
        userSelect:"none",
        display:"inline-block",
      };
      return <span style={style} className={className}>{name}</span>;
    }

    /* ── AccountMenu ────────────────────────────────────────────────────── */
    function AccountMenu() {
      const [open, setOpen] = useState(false);
      const ref = useRef(null);
      const user = JSON.parse(localStorage.getItem("b4lu_user") || "null");

      useEffect(() => {
        function h(e) { if (ref.current && !ref.current.contains(e.target)) setOpen(false); }
        document.addEventListener("mousedown", h);
        return () => document.removeEventListener("mousedown", h);
      }, []);

      function logout() {
        localStorage.removeItem("b4lu_user");
        setOpen(false);
        window.location.reload();
      }

      return (
        <div ref={ref} className="relative">
          <button
            onClick={() => setOpen(v => !v)}
            className="flex items-center gap-1.5 p-1.5 rounded-full hover:bg-surface-container transition-colors"
            aria-label="Account menu"
          >
            {user
              ? <div className="w-7 h-7 rounded-full bg-primary flex items-center justify-center text-white font-bold text-xs">{user.fullName?.[0] ?? "U"}</div>
              : <><Icon name="account_circle" className="text-primary" size={20}/><span className="text-sm font-semibold text-on-surface hidden sm:inline">Sign In</span></>
            }
          </button>
          {open && (
            <div className="absolute right-0 top-full mt-2 w-52 bg-white rounded-2xl shadow-editorial border border-outline-variant/20 z-50 overflow-hidden">
              {user ? (
                <>
                  <div className="px-4 py-3 border-b border-outline-variant/20">
                    <p className="text-sm font-bold text-on-surface truncate">{user.fullName}</p>
                    <p className="text-xs text-on-surface-variant truncate">{user.memberTier} Member</p>
                  </div>
                  <a href="account-mystay-react.html" className="flex items-center gap-3 px-4 py-2.5 text-sm text-on-surface hover:bg-surface-container-low transition-colors">
                    <Icon name="hotel" size={16} className="text-primary"/> My Stays
                  </a>
                  <a href="account-savedlist-react.html" className="flex items-center gap-3 px-4 py-2.5 text-sm text-on-surface hover:bg-surface-container-low transition-colors">
                    <Icon name="bookmark" size={16} className="text-primary"/> Saved Lists
                  </a>
                  <a href="account-review-react.html" className="flex items-center gap-3 px-4 py-2.5 text-sm text-on-surface hover:bg-surface-container-low transition-colors">
                    <Icon name="rate_review" size={16} className="text-primary"/> Reviews
                  </a>
                  <a href="account-friend-react.html" className="flex items-center gap-3 px-4 py-2.5 text-sm text-on-surface hover:bg-surface-container-low transition-colors">
                    <Icon name="group" size={16} className="text-primary"/> Friends
                  </a>
                  <div className="border-t border-outline-variant/20 mt-1">
                    <button onClick={logout} className="flex items-center gap-3 px-4 py-2.5 text-sm text-on-surface-variant hover:bg-surface-container-low transition-colors w-full text-left">
                      <Icon name="logout" size={16}/> Sign Out
                    </button>
                  </div>
                </>
              ) : (
                <>
                  <div className="px-4 py-3 border-b border-outline-variant/20">
                    <p className="text-sm font-semibold text-on-surface-variant">Welcome to Booking4LU</p>
                  </div>
                  <a href="login-react.html" className="flex items-center gap-3 px-4 py-2.5 text-sm font-semibold text-on-surface hover:bg-surface-container-low transition-colors">
                    <Icon name="login" size={16} className="text-primary"/> Sign In
                  </a>
                  <a href="login-react.html" className="flex items-center gap-3 px-4 py-2.5 text-sm font-semibold text-on-surface hover:bg-surface-container-low transition-colors">
                    <Icon name="person_add" size={16} className="text-primary"/> Create Account
                  </a>
                </>
              )}
            </div>
          )}
        </div>
      );
    }

    /* ── StarRow ────────────────────────────────────────────────────────── */
    function StarRow({ rating, size=16 }) {
      return (
        <span className="flex gap-0.5">
          {Array.from({length:5},(_,i)=>(
            <Icon key={i} name="star" filled={i<Math.round(rating)} size={size}
                  className={i<Math.round(rating)?"text-amber-500":"text-outline-variant"} />
          ))}
        </span>
      );
    }

    /* ══════════════════════════════════════════════════════════════════════
       COMPONENT: ImageLightbox  (fullscreen zoom overlay)
    ══════════════════════════════════════════════════════════════════════ */
    function ImageLightbox({ images, startIndex, onClose }) {
      const [active, setActive] = useState(startIndex);
      const [scale, setScale]   = useState(1);
      const [pan,   setPan]     = useState({x:0, y:0});
      const dragging  = useRef(false);
      const dragStart = useRef({x:0, y:0});
      const panStart  = useRef({x:0, y:0});
      const SCALE_STEP = 0.4;
      const MAX_SCALE  = 3;
      const MIN_SCALE  = 1;
      const total = images.length;

      function resetView() { setScale(1); setPan({x:0,y:0}); }
      function prev() { setActive(i=>(i-1+total)%total); resetView(); }
      function next() { setActive(i=>(i+1)%total);       resetView(); }
      function zoomIn()  { setScale(s => Math.min(s + SCALE_STEP, MAX_SCALE)); }
      function zoomOut() { setScale(s => { const ns = Math.max(s - SCALE_STEP, MIN_SCALE); if(ns===1) setPan({x:0,y:0}); return ns; }); }

      /* ── drag-to-pan handlers ── */
      function onMouseDown(e) {
        if(scale <= 1) return;
        dragging.current  = true;
        dragStart.current = {x: e.clientX, y: e.clientY};
        panStart.current  = {...pan};
        e.preventDefault();
      }
      function onMouseMove(e) {
        if(!dragging.current) return;
        setPan({
          x: panStart.current.x + (e.clientX - dragStart.current.x),
          y: panStart.current.y + (e.clientY - dragStart.current.y),
        });
      }
      function onMouseUp(e) {
        dragging.current = false;
      }

      /* ── click vs drag distinction ── */
      function onImgClick(e) {
        const dx = Math.abs(e.clientX - dragStart.current.x);
        const dy = Math.abs(e.clientY - dragStart.current.y);
        if(dx > 4 || dy > 4) return; // was a drag, not a click
        if(scale < MAX_SCALE) zoomIn(); else zoomOut();
      }

      useEffect(()=>{
        function onKey(e){
          if(e.key==="Escape") onClose();
          if(e.key==="ArrowLeft"  && scale<=1) prev();
          if(e.key==="ArrowRight" && scale<=1) next();
          if(e.key==="+" || e.key==="=") zoomIn();
          if(e.key==="-")               zoomOut();
        }
        window.addEventListener("keydown",onKey);
        window.addEventListener("mouseup", onMouseUp);
        document.body.style.overflow="hidden";
        return ()=>{
          window.removeEventListener("keydown",onKey);
          window.removeEventListener("mouseup", onMouseUp);
          document.body.style.overflow="";
        };
      },[scale, pan]);

      const isDraggable = scale > 1;

      return (
        <div className="fixed inset-0 z-[100] flex items-center justify-center"
             style={{background:"rgba(0,0,0,0.92)"}}
             onMouseMove={onMouseMove}
             onMouseUp={onMouseUp}>

          {/* Top-right controls: zoom out · zoom in · close */}
          <div className="absolute top-4 right-4 flex items-center gap-2 z-10">
            <button onClick={zoomOut} disabled={scale<=MIN_SCALE}
                    className="bg-white/10 hover:bg-white/20 disabled:opacity-30 text-white p-2 rounded-full transition-colors"
                    aria-label="Zoom out">
              <Icon name="zoom_out" size={22} className="text-white"/>
            </button>
            <button onClick={zoomIn} disabled={scale>=MAX_SCALE}
                    className="bg-white/10 hover:bg-white/20 disabled:opacity-30 text-white p-2 rounded-full transition-colors"
                    aria-label="Zoom in">
              <Icon name="zoom_in" size={22} className="text-white"/>
            </button>
            <button onClick={onClose}
                    className="bg-white/10 hover:bg-white/20 text-white p-2 rounded-full transition-colors"
                    aria-label="Close">
              <Icon name="close" size={24} className="text-white"/>
            </button>
          </div>

          {/* Counter + zoom level */}
          <span className="absolute top-4 left-1/2 -translate-x-1/2 text-white/70 text-sm font-semibold select-none">
            {active+1} / {total}
            {scale > 1 && <span className="ml-2 text-white/50 text-xs">{Math.round(scale*100)}%</span>}
          </span>

          {/* Prev — hide when zoomed in (use drag instead) */}
          {total > 1 && !isDraggable && (
            <button onClick={prev}
                    className="absolute left-4 top-1/2 -translate-y-1/2 bg-white/10 hover:bg-white/20 text-white p-3 rounded-full transition-colors z-10"
                    aria-label="Previous">
              <Icon name="arrow_back_ios_new" size={20} className="text-white"/>
            </button>
          )}

          {/* Image container — clips overflow when panning */}
          <div className="rounded-xl overflow-hidden"
               style={{maxWidth:"90vw", maxHeight:"85vh", lineHeight:0}}>
            <img
              src={images[active]}
              alt={`Photo ${active+1}`}
              draggable={false}
              onMouseDown={onMouseDown}
              onClick={onImgClick}
              style={{
                transform: `scale(${scale}) translate(${pan.x/scale}px, ${pan.y/scale}px)`,
                transition: dragging.current ? "none" : "transform .25s cubic-bezier(.4,0,.2,1)",
                transformOrigin: "center center",
                display: "block",
                maxWidth: "90vw",
                maxHeight: "85vh",
                objectFit: "contain",
                cursor: isDraggable ? (dragging.current ? "grabbing" : "grab") : (scale < MAX_SCALE ? "zoom-in" : "zoom-out"),
                userSelect: "none",
              }}
              className="shadow-2xl"
            />
          </div>

          {/* Next — hide when zoomed in */}
          {total > 1 && !isDraggable && (
            <button onClick={next}
                    className="absolute right-4 top-1/2 -translate-y-1/2 bg-white/10 hover:bg-white/20 text-white p-3 rounded-full transition-colors z-10"
                    aria-label="Next">
              <Icon name="arrow_forward_ios" size={20} className="text-white"/>
            </button>
          )}

          {/* Thumbnail strip */}
          {total > 1 && (
            <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2 overflow-x-auto max-w-[90vw] px-2">
              {images.map((src,i)=>(
                <button key={i} onClick={()=>{setActive(i);resetView();}}
                        className={`flex-none w-16 h-11 rounded-lg overflow-hidden border-2 transition-all ${i===active?"border-white":"border-white/20 opacity-50 hover:opacity-80"}`}>
                  <img src={src} alt="" className="w-full h-full object-cover"/>
                </button>
              ))}
            </div>
          )}
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════════════
       COMPONENT: ImageGallery  (hero carousel + thumbnail strip)
    ══════════════════════════════════════════════════════════════════════ */
    function ImageGallery({ images }) {
      const [active, setActive] = useState(0);
      const [lightbox, setLightbox] = useState(false);
      const total = images.length;
      function prev() { setActive(i=>(i-1+total)%total); }
      function next() { setActive(i=>(i+1)%total); }
      useEffect(()=>{
        function onKey(e){ if(e.key==="ArrowLeft") prev(); if(e.key==="ArrowRight") next(); }
        window.addEventListener("keydown",onKey);
        return ()=>window.removeEventListener("keydown",onKey);
      },[]);
      return (
        <div className="w-full">
          {lightbox && (
            <ImageLightbox images={images} startIndex={active} onClose={()=>setLightbox(false)}/>
          )}
          <div className="relative w-full rounded-2xl overflow-hidden bg-surface-container-highest"
               style={{height:"clamp(260px,40vw,480px)"}}>
            <div className="flex h-full"
                 style={{transform:`translateX(-${active*100}%)`,transition:"transform .38s cubic-bezier(.4,0,.2,1)"}}>
              {images.map((src,i)=>(
                <img key={i} src={src} alt={`Photo ${i+1}`}
                     className="w-full h-full object-cover flex-none" style={{minWidth:"100%"}}/>
              ))}
            </div>
            {/* Zoom button — top-right */}
            <button onClick={()=>setLightbox(true)}
                    className="absolute top-3 right-3 bg-white/80 hover:bg-white text-on-surface w-9 h-9 rounded-full shadow-card flex items-center justify-center z-10 transition-colors"
                    aria-label="Zoom image">
              <Icon name="zoom_in" size={20}/>
            </button>
            <button onClick={prev} className="absolute left-4 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white p-2 rounded-full shadow-card z-10 transition-colors">
              <Icon name="arrow_back_ios_new" size={18}/>
            </button>
            <button onClick={next} className="absolute right-4 top-1/2 -translate-y-1/2 bg-white/80 hover:bg-white p-2 rounded-full shadow-card z-10 transition-colors">
              <Icon name="arrow_forward_ios" size={18}/>
            </button>
            <div className="absolute bottom-4 left-1/2 -translate-x-1/2 flex gap-2 z-10">
              {images.map((_,i)=>(
                <button key={i} onClick={()=>setActive(i)}
                        className={`h-2 rounded-full transition-all ${i===active?"bg-white w-5":"bg-white/50 w-2"}`}/>
              ))}
            </div>
          </div>
          <div className="flex gap-3 mt-3 overflow-x-auto pb-1">
            {images.map((src,i)=>(
              <button key={i} onClick={()=>setActive(i)}
                      className={`flex-none w-20 h-14 rounded-xl overflow-hidden border-2 transition-all ${i===active?"border-primary":"border-transparent opacity-60 hover:opacity-100"}`}>
                <img src={src} alt="" className="w-full h-full object-cover"/>
              </button>
            ))}
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════════════
       COMPONENT: Navbar
    ══════════════════════════════════════════════════════════════════════ */

    /* ══════════════════════════════════════════════════════════════════════
       COMPONENT: AmenitiesCard
    ══════════════════════════════════════════════════════════════════════ */
    function AmenitiesCard({ hotel }) {
      const [showAll, setShowAll] = useState(false);
      const visible = showAll ? hotel.amenities : hotel.amenities.slice(0,3);
      return (
        <div className="bg-white rounded-2xl shadow-card p-5 flex flex-col gap-3">
          <h3 className="font-headline font-bold text-base text-on-surface">Amenities</h3>
          <div className="flex gap-3 flex-wrap">
            {visible.map(a=>{
              const m = AMENITY_META[a]||{icon:a,label:a};
              return (
                <div key={a} className="flex flex-col items-center gap-1 border border-outline-variant rounded-xl px-3 py-2 min-w-[64px] bg-surface-container-low">
                  <div className="w-9 h-9 flex items-center justify-center">
                    <Icon name={m.icon} size={22} className="text-tertiary-container"/>
                  </div>
                  <span className="text-[10px] font-semibold text-on-surface-variant uppercase tracking-wide whitespace-nowrap">{m.label}</span>
                </div>
              );
            })}
          </div>
          {hotel.amenities.length > 3 && (
            <button
              onClick={()=>setShowAll(v=>!v)}
              className="text-xs font-semibold text-primary underline underline-offset-2 hover:opacity-70 transition-opacity self-start"
            >
              {showAll ? "Show less ▲" : `Show more (${hotel.amenities.length - 3} more) ▼`}
            </button>
          )}
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════════════
       COMPONENT: BookingCard
    ══════════════════════════════════════════════════════════════════════ */
    function BookingCard({ hotel }) {
      const today = new Date().toISOString().split("T")[0];
      const threeDays = new Date(Date.now()+3*86400000).toISOString().split("T")[0];
      const [checkIn,  setCheckIn]  = useState(today);
      const [checkOut, setCheckOut] = useState(threeDays);
      const [adults,   setAdults]   = useState(2);
      const [rooms,    setRooms]    = useState(1);
      const [booking,  setBooking]  = useState(null);

      const nights = Math.max(1, Math.round((new Date(checkOut)-new Date(checkIn))/86400000));
      const total  = hotel.pricePerNight * nights;

      async function handleBook() {
        setBooking("loading");
        await window.API.createBooking({ hotelId:hotel.id, checkIn, checkOut, adults, rooms, totalPrice:total });
        setBooking("done");
      }

      return (
        <div className="bg-primary rounded-2xl shadow-editorial p-6 flex flex-col gap-4 text-white">
          <h3 className="font-headline font-bold text-lg">Check Availability</h3>
          <div className="grid grid-cols-2 gap-3">
            <div className="bg-white/15 rounded-xl p-3">
              <p className="text-[10px] font-bold uppercase tracking-widest opacity-70 mb-1">Check In</p>
              <input type="date" value={checkIn} min={today} onChange={e=>setCheckIn(e.target.value)}
                     className="bg-transparent border-0 text-white font-semibold text-sm w-full focus:ring-0 p-0 cursor-pointer"/>
            </div>
            <div className="bg-white/15 rounded-xl p-3">
              <p className="text-[10px] font-bold uppercase tracking-widest opacity-70 mb-1">Check Out</p>
              <input type="date" value={checkOut} min={checkIn} onChange={e=>setCheckOut(e.target.value)}
                     className="bg-transparent border-0 text-white font-semibold text-sm w-full focus:ring-0 p-0 cursor-pointer"/>
            </div>
          </div>
          <div className="bg-white/15 rounded-xl p-3">
            <p className="text-[10px] font-bold uppercase tracking-widest opacity-70 mb-2">Guests</p>
            <div className="flex items-center justify-between">
              <div className="flex items-center gap-2">
                <button onClick={()=>setAdults(v=>Math.max(1,v-1))} className="w-7 h-7 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center"><Icon name="remove" size={14}/></button>
                <span className="font-bold text-sm w-5 text-center">{adults}</span>
                <button onClick={()=>setAdults(v=>Math.min(10,v+1))} className="w-7 h-7 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center"><Icon name="add" size={14}/></button>
                <span className="text-sm opacity-80">Adults</span>
              </div>
              <div className="flex items-center gap-2">
                <button onClick={()=>setRooms(v=>Math.max(1,v-1))} className="w-7 h-7 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center"><Icon name="remove" size={14}/></button>
                <span className="font-bold text-sm w-5 text-center">{rooms}</span>
                <button onClick={()=>setRooms(v=>Math.min(5,v+1))} className="w-7 h-7 rounded-full bg-white/20 hover:bg-white/30 flex items-center justify-center"><Icon name="add" size={14}/></button>
                <span className="text-sm opacity-80">Room{rooms>1?"s":""}</span>
              </div>
            </div>
          </div>
          <div className="flex items-center justify-between text-sm opacity-80">
            <span>{fmtPrice(hotel.pricePerNight)} × {nights} night{nights>1?"s":""}</span>
            <span className="font-bold text-white">{fmtPrice(total)}</span>
          </div>
          {booking==="done" ? (
            <div className="bg-green-500 text-white rounded-2xl py-4 text-center font-bold flex items-center justify-center gap-2">
              <Icon name="check_circle" filled size={20}/> Booking Confirmed!
            </div>
          ) : (
            <button onClick={handleBook} disabled={booking==="loading"}
                    className="w-full bg-secondary-container text-on-secondary-container py-4 rounded-2xl font-bold text-sm hover:brightness-95 transition-all active:scale-95 disabled:opacity-60 flex items-center justify-center gap-2">
              {booking==="loading" && <div className="w-4 h-4 border-2 border-on-secondary-container border-t-transparent rounded-full animate-spin"/>}
              Book Now
            </button>
          )}
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════════════
       COMPONENT: AboutSection
    ══════════════════════════════════════════════════════════════════════ */
    function AboutSection({ hotel }) {
      const [expanded, setExpanded] = useState(false);
      const short = hotel.description.slice(0, 280);
      const hasMore = hotel.description.length > 280;
      return (
        <div>
          <h2 className="font-headline text-xl font-extrabold text-primary mb-3">About the Property</h2>
          <p className="text-sm text-on-surface-variant leading-relaxed whitespace-pre-line">
            {expanded ? hotel.description : short}{hasMore && !expanded ? "…" : ""}
          </p>
          {hasMore && (
            <button onClick={()=>setExpanded(v=>!v)}
                    className="mt-2 flex items-center gap-1 text-sm font-bold text-primary hover:text-primary-container transition-colors">
              {expanded ? "Show less" : "Read full description"}
              <Icon name={expanded?"expand_less":"arrow_right_alt"} size={18}/>
            </button>
          )}
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════════════
       COMPONENT: ReviewsSection
    ══════════════════════════════════════════════════════════════════════ */
    function ReviewsSection({ hotel }) {
      const [showAll, setShowAll] = useState(false);
      const displayed = showAll ? hotel.reviews : hotel.reviews.slice(0,2);
      return (
        <div>
          <div className="flex items-center justify-between mb-4">
            <h2 className="font-headline text-xl font-extrabold text-primary">Latest Guest Reviews</h2>
            <button onClick={()=>setShowAll(v=>!v)}
                    className="text-sm font-semibold text-primary hover:text-primary-container transition-colors">
              See all {hotel.reviewCount.toLocaleString()} reviews
            </button>
          </div>
          <div className="flex flex-col gap-4">
            {displayed.map(r=>(
              <div key={r.id} className="bg-white rounded-2xl p-5 shadow-card hover:shadow-editorial transition-shadow">
                <div className="flex items-start gap-3 mb-3">
                  <div className="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center flex-none">
                    <Icon name="person" size={20} className="text-primary"/>
                  </div>
                  <div className="flex-1 min-w-0">
                    <p className="font-bold text-sm text-on-surface">{r.author}</p>
                    <p className="text-xs text-on-surface-variant">{r.stayInfo}</p>
                  </div>
                  <StarRow rating={r.rating} size={14}/>
                </div>
                <p className="text-sm text-on-surface-variant leading-relaxed italic">"{r.text}"</p>
              </div>
            ))}
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════════════
       COMPONENT: NearbyLandmarksCard
    ══════════════════════════════════════════════════════════════════════ */
    function NearbyLandmarksCard({ hotel }) {
      const mapRef = useRef(null);
      const [mapReady, setMapReady] = useState(false);

      useEffect(()=>{
        const key = window.API.GOOGLE_MAPS_KEY;
        function initMap() {
          if (!window.google?.maps || !mapRef.current) return;
          new google.maps.Map(mapRef.current, {
            center:{ lat:hotel.lat, lng:hotel.lng }, zoom:15,
            disableDefaultUI:true, gestureHandling:"none",
            styles:[
              {elementType:"geometry",stylers:[{color:"#f2f4f7"}]},
              {featureType:"road",elementType:"geometry",stylers:[{color:"#ffffff"}]},
              {featureType:"water",elementType:"geometry",stylers:[{color:"#bee9ff"}]},
              {featureType:"poi",elementType:"labels",stylers:[{visibility:"off"}]},
            ],
          });
          setMapReady(true);
        }
        if (window.google?.maps) { initMap(); return; }
        if (!key || key==="YOUR_GOOGLE_MAPS_API_KEY") return;
        if (!document.querySelector('script[src*="maps.googleapis"]')) {
          const s = document.createElement("script");
          s.src=`https://maps.googleapis.com/maps/api/js?key=${key}`;
          s.async=true; s.onload=initMap;
          document.head.appendChild(s);
        }
      },[]);

      return (
        <div className="bg-white rounded-2xl shadow-card overflow-hidden">
          <div className="p-5">
            <h3 className="font-headline font-bold text-lg text-primary mb-4">Nearby Landmarks</h3>
            <div className="flex flex-col gap-4">
              {hotel.nearbyLandmarks.map((l,i)=>(
                <div key={i} className="flex gap-3 items-start">
                  {/* Thumbnail */}
                  <div className="flex-none w-16 h-16 rounded-xl overflow-hidden bg-surface-container-low">
                    {l.image
                      ? <img src={l.image} alt={l.name} className="w-full h-full object-cover"
                             onError={e=>{e.target.style.display="none"; e.target.nextSibling.style.display="flex";}}/>
                      : null
                    }
                    <div className="w-full h-full items-center justify-center"
                         style={{display: l.image ? "none" : "flex"}}>
                      <Icon name={l.icon||"place"} size={22} className="text-primary"/>
                    </div>
                  </div>
                  {/* Info */}
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center justify-between gap-2 mb-0.5">
                      <span className="text-sm font-semibold text-on-surface truncate">{l.name}</span>
                      <span className="text-xs font-bold text-secondary flex-none">{l.distance}</span>
                    </div>
                    {l.desc && (
                      <p className="text-xs text-on-surface-variant leading-relaxed line-clamp-2">{l.desc}</p>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>
          <div className="relative h-40 bg-surface-container-highest">
            <div ref={mapRef} className="absolute inset-0 w-full h-full"/>
            {!mapReady && (
              <div className="absolute inset-0 map-tile flex items-end justify-center pb-3">
                <button onClick={()=>window.open(`https://maps.google.com/?q=${hotel.lat},${hotel.lng}`,"_blank")}
                        className="bg-white/90 text-primary text-xs font-bold px-4 py-2 rounded-full shadow-card hover:bg-white transition-colors flex items-center gap-1">
                  <Icon name="map" size={14}/> View on Map
                </button>
              </div>
            )}
          </div>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════════════
       COMPONENT: TransportCard
    ══════════════════════════════════════════════════════════════════════ */
    function TransportCard() {
      return (
        <div className="bg-primary-container rounded-2xl p-5 flex items-start gap-4">
          <div className="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center flex-none">
            <Icon name="airport_shuttle" size={22} className="text-white"/>
          </div>
          <div className="flex-1">
            <p className="font-bold text-white text-sm">Need private transport?</p>
            <p className="text-white/70 text-xs mt-0.5">Book a chauffeur from the airport directly to our lobby.</p>
          </div>
          <button className="bg-secondary-container text-on-secondary-container px-4 py-2 rounded-xl text-xs font-bold hover:brightness-95 transition-all whitespace-nowrap">
            Add Transfer
          </button>
        </div>
      );
    }

    /* ══════════════════════════════════════════════════════════════════════
       ROOT: App
    ══════════════════════════════════════════════════════════════════════ */
    function App() {
      const [hotel,   setHotel]   = useState(null);
      const [loading, setLoading] = useState(true);
      const [error,   setError]   = useState(null);

      useEffect(()=>{
        async function load() {
          try {
            const h = await window.API.getHotel(window.HOTEL_ID);
            if (!h) throw new Error("Hotel not found");
            setHotel(h);
            document.title = `${h.name} | Booking4LU`;
          } catch(e) { setError(e.message); }
          finally { setLoading(false); }
        }
        load();
      },[]);

      if (loading) return (
        <div className="h-screen flex items-center justify-center bg-background">
          <div className="flex flex-col items-center gap-3">
            <div className="w-12 h-12 border-4 border-primary border-t-transparent rounded-full animate-spin"/>
            <p className="text-sm font-semibold text-on-surface-variant">Loading hotel…</p>
          </div>
        </div>
      );

      if (error) return (
        <div className="h-screen flex items-center justify-center bg-background">
          <div className="text-center">
            <Icon name="error_outline" size={48} className="text-outline mb-3"/>
            <p className="font-headline font-bold text-xl text-primary mb-2">Hotel not found</p>
            <p className="text-sm text-on-surface-variant mb-4">{error}</p>
            <a href="homepage-react.html"
               className="inline-flex items-center gap-2 bg-primary text-white px-6 py-3 rounded-2xl font-bold text-sm hover:bg-primary-container transition-colors">
              <Icon name="arrow_back" size={18}/> Back to Search
            </a>
          </div>
        </div>
      );

      return (
        <div className="min-h-screen bg-background flex flex-col">
          <Navbar hotelName={hotel.name}/>
          <div className="bg-white border-b border-outline-variant/10">
            <Breadcrumb hotel={hotel}/>
          </div>
          <div className="flex-1 max-w-screen-xl mx-auto w-full px-4 md:px-6 py-6">
            <div className="flex flex-col lg:flex-row gap-8">
              {/* Left column */}
              <div className="flex-1 min-w-0 flex flex-col gap-8">
                <ImageGallery images={hotel.images}/>
                <div className="bg-white rounded-2xl shadow-card p-6">
                  <AboutSection hotel={hotel}/>
                </div>
                <div className="bg-surface-container-low rounded-2xl p-6">
                  <ReviewsSection hotel={hotel}/>
                </div>
              </div>
              {/* Right column */}
              <div className="w-full lg:w-[340px] flex-none flex flex-col gap-5">
                <HotelSummaryCard hotel={hotel}/>
                <AmenitiesCard hotel={hotel}/>
                <BookingCard hotel={hotel}/>
                <NearbyLandmarksCard hotel={hotel}/>
                <TransportCard/>
              </div>
            </div>
          </div>
          <footer className="border-t border-outline-variant/20 bg-surface-container-low mt-8">
            <div className="flex flex-col md:flex-row items-center justify-between px-6 py-5 gap-3 max-w-screen-xl mx-auto">
              <a href="homepage-react.html" className="font-headline font-extrabold text-primary">Booking4LU</a>
              <div className="flex gap-6">
                {["About","Contact","Privacy","Terms","Support"].map(l=>(
                  <a key={l} href="#" className="text-[11px] uppercase tracking-widest font-semibold text-on-surface-variant hover:text-secondary transition-colors">{l}</a>
                ))}
              </div>
              <p className="text-[10px] text-outline">© 2024 Booking4LU. Editorial Excellence in Travel.</p>
            </div>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
